<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>General Store Billing System</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="logo">
            <span>📦 StoreOS</span>
        </div>
        <nav>
            <div class="nav-link active" onclick="showSection('dashboard')">🏠 Dashboard</div>
            <div class="nav-link" onclick="showSection('billing')">💳 New Sale</div>
            <div class="nav-link" onclick="showSection('products')">🛒 Products</div>
            <div class="nav-link" onclick="showSection('customers')">👥 Customers</div>
            <div class="nav-link" onclick="showSection('history')">📜 Sales History</div>
            <div class="nav-link" onclick="showSection('reports')">📊 Reports</div>
        </nav>
        <div style="margin-top: auto;">
            <div class="nav-link" onclick="logout()">🚪 Logout</div>
        </div>
    </div>

    <main class="main-content">
        <div id="content-area">
            <!-- Dynamic content injected here -->
        </div>
    </main>

    <!-- Modal for Login -->
    <div id="login-modal" class="modal" style="display: flex;">
        <div class="modal-content">
            <h2 style="margin-bottom: 1.5rem;">Welcome Back</h2>
            <form id="login-form">
                <div style="margin-bottom: 1rem;">
                    <label>Username</label><br>
                    <input type="text" id="username" style="width: 100%;" required>
                </div>
                <div style="margin-bottom: 1.5rem;">
                    <label>Password</label><br>
                    <input type="password" id="password" style="width: 100%;" required>
                </div>
                <button type="submit" style="width: 100%;">Sign In</button>
                <p id="login-error" style="color: var(--danger); margin-top: 1rem; font-size: 0.875rem; text-align: center;"></p>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
